dbt_demo_project:
  outputs:
    dev:
      dataset: ducks_dataset
      job_execution_timeout_seconds: 300
      job_retries: 1
      keyfile: D:\Demo\ducks-etl-pipeline\keys\GCP_KEY.json
      location: europe-west2
      method: service-account
      priority: interactive
      project: ducks-etl-project
      threads: 4
      type: bigquery
  target: dev
dbt_gcp_project:
  outputs:
    dev:
      dataset: "{{ env_var('BQ_RAW_DATASET') }}"
      job_execution_timeout_seconds: 300
      job_retries: 1
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      location: europe-west2
      method: service-account
      priority: interactive
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      threads: 1
      type: bigquery
  target: dev
